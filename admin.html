<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Four Nations News Admin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

header{
    background:#14274e;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:2rem;
}

.logout-btn{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    max-width:1400px;
    margin:30px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:20px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:1rem;
}

textarea{
    resize:vertical;
}

#summary{
    height:120px;
}

#content{
    height:250px;
}

.publish-btn{
    background:#14274e;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
}

.publish-btn:hover{
    background:#1f3d73;
}

.checkbox-row{
    display:flex;
    gap:30px;
    margin-bottom:20px;
}

.checkbox-row label{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.checkbox-row input{
    width:auto;
    margin:0;
}

.article-list{
    display:grid;
    gap:15px;
}

.article-item{
    border:1px solid #ddd;
    padding:20px;
    border-radius:10px;
}

.article-item h3{
    margin-bottom:10px;
}

.article-item p{
    margin-bottom:8px;
}

.actions{
    margin-top:15px;
}

.delete-btn{
    background:#d90429;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#b00020;
}

</style>
</head>

<body>

<header>

    <h1>Four Nations News Admin</h1>

    <button
        id="logoutBtn"
        class="logout-btn">
        Logout
    </button>

</header>

<div class="container">

    <div class="card">

        <h2>Create Article</h2>

        <input
            id="title"
            placeholder="Article Title">

        <input
            id="author"
            placeholder="Author">

        <select id="category">
            <option>ATLA</option>
            <option>LOK</option>
            <option>Seven Havens</option>
            <option>Books / Comics</option>
            <option>Other</option>
        </select>

        <input
            id="image1"
            placeholder="Featured Image URL">

        <input
            id="image2"
            placeholder="Additional Image URL">

        <input
            id="image3"
            placeholder="Additional Image URL">

        <input
            id="image4"
            placeholder="Additional Image URL">

        <textarea
            id="summary"
            placeholder="Article Summary"></textarea>

        <textarea
            id="content"
            placeholder="Full Article Content"></textarea>

        <div class="checkbox-row">

            <label>
                <input type="checkbox" id="featured">
                Featured Story
            </label>

            <label>
                <input type="checkbox" id="breaking">
                Breaking News
            </label>

        </div>

        <button
            class="publish-btn"
            id="publishBtn">
            Publish Article
        </button>

    </div>

    <div class="card">

        <h2>Existing Articles</h2>

        <div
            id="articleList"
            class="article-list">

        </div>

    </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
