<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apply - Four Nations News</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

header{
    background:#14274e;
    color:white;
    padding:25px;
}

header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    max-width:800px;
    margin:40px auto;
    padding:0 20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

textarea{
    height:180px;
}

button{
    background:#14274e;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>

    <a href="index.html">
        ← Back to Home
    </a>

</header>

<div class="container">

    <div class="card">

        <h1>Join Four Nations News</h1>

        <p style="margin-bottom:20px;">

            Interested in writing, editing, graphic design,
            social media, or helping grow the Avatar community?
            Apply below.

        </p>

        <input
            placeholder="Name">

        <input
            placeholder="Email">

        <input
            placeholder="Role Interested In">

        <textarea
            placeholder="Why do you want to join?"></textarea>

        <button>
            Submit Application
        </button>

    </div>

</div>

</body>
</html>
