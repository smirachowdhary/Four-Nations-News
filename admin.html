<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Four Nations News Admin</title>

<style>
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
    color:#111;
}

header{
    background:#14274e;
    color:white;
    padding:20px 40px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

header h1{
    font-size:2rem;
}

.container{
    max-width:1500px;
    margin:30px auto;
    padding:0 25px;
}

.grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
    align-items:start;
}

.card{
    background:white;
    border-radius:12px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:20px;
    font-size:1.5rem;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-bottom:12px;

    border:1px solid #d8d8d8;
    border-radius:8px;

    font-size:.95rem;
}

textarea{
    resize:vertical;
}

#summary{
    height:120px;
}

#content{
    height:250px;
}

button{
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.publish-btn{
    background:#14274e;
    color:white;
}

.save-btn{
    background:#198754;
    color:white;
    display:none;
}

.logout-btn{
    background:white;
    color:#111;
}

.featured-box{

    display:flex;

    align-items:center;

    gap:10px;

    margin:15px 0 20px;
}

.featured-box label{

    font-weight:600;

    margin:0;

    display:flex;

    align-items:center;

    gap:10px;
}

.featured-box input{

    width:auto;

    margin:0;
}

.article-list{
    display:grid;
    gap:12px;
}

.article-item{

    border:1px solid #e5e7eb;

    border-radius:10px;

    padding:18px;

    background:white;
}

.article-item h3{
    margin-bottom:6px;
}

.actions{

    display:flex;

    gap:8px;

    margin-top:10px;
}

.edit-btn{
    background:#0d6efd;
    color:white;

    padding:7px 14px;
    font-size:.85rem;
}

.delete-btn{
    background:#d90429;
    color:white;

    padding:7px 14px;
    font-size:.85rem;
}

@media(max-width:1000px){

    .grid{
        grid-template-columns:1fr;
    }

    header{
        flex-direction:column;
        gap:15px;
    }
}

</style>
</head>

<body>

<header>

    <h1>Four Nations News Admin</h1>

    <button
        id="logoutBtn"
        class="logout-btn">
        Logout
    </button>

</header>

<div class="container">

    <div class="grid">

        <div>

            <div class="card">

                <h2>Create / Edit Article</h2>

                <input
                    id="title"
                    placeholder="Article Title">

                <input
                    id="author"
                    placeholder="Author">

                <select id="category">

                    <option>ATLA</option>
                    <option>LOK</option>
                    <option>Seven Havens</option>
                    <option>Books / Comics</option>
                    <option>Other</option>

                </select>

                <input
                    id="image1"
                    placeholder="Featured Image URL">

                <input
                    id="image2"
                    placeholder="Additional Image URL">

                <input
                    id="image3"
                    placeholder="Additional Image URL">

                <input
                    id="image4"
                    placeholder="Additional Image URL">

                <textarea
                    id="summary"
                    placeholder="Article Summary"></textarea>

                <textarea
                    id="content"
                    placeholder="Full Article"></textarea>

                <div class="featured-box">

                    <label>

                        <input
                            type="checkbox"
                            id="featured">

                        Featured Story

                    </label>

                </div>

                <div class="featured-box">

                    <label>

                </div>

                <button
                    id="publishBtn"
                    class="publish-btn">

                    Publish

                </button>

                <button
                    id="saveBtn"
                    class="save-btn">

                    Save Changes

                </button>

            </div>

        </div>

        <div>

            <div class="card">

                <h2>Character Spotlight</h2>

                <input
                    id="spotlightName"
                    placeholder="Character Name">

                <textarea
                    id="spotlightDescription"
                    placeholder="Character Description"></textarea>

                <input
                    id="spotlightImage"
                    placeholder="Character Image URL">

                <button
                    id="saveSpotlight">

                    Save Spotlight

                </button>

            </div>

            <div class="card">

                <h2>Avatar Quote</h2>

                <textarea
                    id="quoteText"
                    placeholder="Quote"></textarea>

                <input
                    id="quoteAuthor"
                    placeholder="Quote Author">

                <button
                    id="saveQuote">

                    Save Quote

                </button>

            </div>

        </div>

    </div>

    <div class="card">

        <h2>Existing Articles</h2>

        <div
            id="articleList"
            class="article-list">
        </div>

    </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
