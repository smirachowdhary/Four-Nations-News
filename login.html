<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, Helvetica, sans-serif;

    background:linear-gradient(
        135deg,
        #0f172a,
        #14274e,
        #1e3a70
    );
}

.login-card{

    width:420px;

    background:white;

    border-radius:20px;

    padding:40px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{

    font-size:3rem;
    margin-bottom:10px;
}

h1{

    margin-bottom:10px;
}

.subtitle{

    color:#666;
    margin-bottom:30px;
}

#googleLogin{

    width:100%;

    padding:16px;

    border:none;

    border-radius:10px;

    background:#14274e;

    color:white;

    font-size:1rem;

    font-weight:700;

    cursor:pointer;
}

#googleLogin:hover{

    background:#1f3d73;
}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">🔥</div>

    <h1>Four Nations News</h1>

    <p class="subtitle">
        Administrator Login
    </p>

    <button id="googleLogin">
        Sign In With Google
    </button>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
