<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Four Nations News Admin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

header{
    background:#14274e;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    max-width:1400px;
    margin:30px auto;
    padding:0 20px;
}

.grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.card{
    background:white;
    border-radius:12px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

textarea{
    resize:vertical;
}

#summary{
    height:120px;
}

#content{
    height:220px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

.publish-btn{
    background:#14274e;
    color:white;
}

.save-btn{
    background:#198754;
    color:white;
    display:none;
}

.logout-btn{
    background:white;
}

.article-list{
    display:grid;
    gap:15px;
}

.article-item{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
}

.edit-btn{
    background:#0d6efd;
    color:white;
    margin-right:10px;
}

.delete-btn{
    background:#d90429;
    color:white;
}

.featured-box{
    margin:10px 0;
}

</style>
</head>

<body>

<header>

    <h1>Four Nations News Admin</h1>

    <button
        id="logoutBtn"
        class="logout-btn">
        Logout
    </button>

</header>

<div class="container">

    <div class="grid">

        <div>

            <div class="card">

                <h2>Create / Edit Article</h2>

                <input
                    id="title"
                    placeholder="Article Title">

                <input
                    id="author"
                    placeholder="Author">

                <select id="category">

                    <option>ATLA</option>
                    <option>LOK</option>
                    <option>Seven Havens</option>
                    <option>Books / Comics</option>
                    <option>Other</option>

                </select>

                <input
                    id="image1"
                    placeholder="Featured Image URL">

                <input
                    id="image2"
                    placeholder="Additional Image URL">

                <input
                    id="image3"
                    placeholder="Additional Image URL">

                <input
                    id="image4"
                    placeholder="Additional Image URL">

                <textarea
                    id="summary"
                    placeholder="Article Summary"></textarea>

                <textarea
                    id="content"
                    placeholder="Full Article"></textarea>

                <div class="featured-box">

                    <label>

                        <input
                            type="checkbox"
                            id="featured">

                        Featured Story

                    </label>

                </div>

                <div class="featured-box">

                    <label>

                        <input
                            type="checkbox"
                            id="breaking">

                        Breaking News

                    </label>

                </div>

                <button
                    id="publishBtn"
                    class="publish-btn">

                    Publish

                </button>

                <button
                    id="saveBtn"
                    class="save-btn">

                    Save Changes

                </button>

            </div>

        </div>

        <div>

            <div class="card">

                <h2>Character Spotlight</h2>

                <input
                    id="spotlightName"
                    placeholder="Character Name">

                <textarea
                    id="spotlightDescription"
                    placeholder="Character Description"></textarea>

                <input
                    id="spotlightImage"
                    placeholder="Character Image URL">

                <button
                    id="saveSpotlight">

                    Save Spotlight

                </button>

            </div>

            <div class="card">

                <h2>Avatar Quote</h2>

                <textarea
                    id="quoteText"
                    placeholder="Quote"></textarea>

                <input
                    id="quoteAuthor"
                    placeholder="Quote Author">

                <button
                    id="saveQuote">

                    Save Quote

                </button>

            </div>

        </div>

    </div>

    <div class="card">

        <h2>Existing Articles</h2>

        <div
            id="articleList"
            class="article-list">
        </div>

    </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
