<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Article</title>

<link rel="stylesheet" href="css/styles.css">

<style>

.article-actions{
    display:flex;
    gap:20px;
    margin:20px 0;
    align-items:center;
}

.like-btn{
    background:#14274e;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

.comments-section,
.related-section{
    margin-top:50px;
}

.comment-card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:12px;
}

.comment-form input,
.comment-form textarea{
    width:100%;
    padding:12px;
    margin-bottom:10px;
}

.comment-form button{
    padding:12px 18px;
}

.related-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.related-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    text-decoration:none;
    color:black;
}

.related-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.related-card div{
    padding:15px;
}

</style>

</head>

<body>

<header>

<a href="index.html">

← Back To Home

</a>

</header>

<div class="container">

<div class="article">

<h1 id="title">
Loading...
</h1>

<div class="meta">

<span id="author"></span>

•

<span id="category"></span>

</div>

<img
id="featuredImage"
class="featured-image"
src=""
>

<div class="article-actions">

<div>
👁️ <span id="views">0</span> Views
</div>

<div>
👍 <span id="likes">0</span> Likes
</div>

<button
id="likeBtn"
class="like-btn"
>
Like
</button>

</div>

<div
id="gallery"
class="gallery"
></div>

<div
id="content"
class="content"
></div>

<div class="comments-section">

<h2>
Comments
</h2>

<div class="comment-form">

<input
id="commentName"
placeholder="Name"
>

<textarea
id="commentText"
placeholder="Leave a comment..."
></textarea>

<button id="postComment">
Post Comment
</button>

</div>

<div id="commentsList">

</div>

</div>

<div class="related-section">

<h2>
Related Articles
</h2>

<div
id="relatedArticles"
class="related-grid"
>

</div>

</div>

</div>

</div>

<script type="module" src="js/article.js"></script>

</body>
</html>
